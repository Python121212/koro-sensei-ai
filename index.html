<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殺せんせーの教室</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFF100] min-h-screen flex flex-col font-sans text-black">
    <header class="p-4 bg-black text-white text-center font-bold text-xl shadow-lg">殺せんせーの特別授業</header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 pb-24"></main>

    <div class="fixed bottom-0 w-full p-4 bg-white border-t-4 border-black">
        <div class="max-w-2xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 p-3 border-2 border-black outline-none focus:ring-2 focus:ring-yellow-400" placeholder="先生に質問を...">
            <button onclick="askKoro()" class="bg-black text-white px-6 py-2 font-bold active:scale-95 transition">送信</button>
        </div>
    </div>

    <script>
        async function askKoro() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="text-right"><span class="bg-white border-2 border-black p-2 inline-block rounded-lg shadow-sm">君：${userText}</span></div>`;
            input.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ prompt: userText })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;

                chatBox.innerHTML += `<div class="bg-yellow-200 border-2 border-black p-3 rounded-lg shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <strong>殺せんせー：</strong>${reply}</div>`;
                window.scrollTo(0, document.body.scrollHeight);
            } catch (e) {
                alert('マッハ20で逃げられました。設定を確認してください！');
            }
        }
    </script>
</body>
</html>
