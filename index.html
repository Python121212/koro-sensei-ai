<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殺せんせーの特別授業</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .koro-face { background-color: #FFF100; }
        .koro-msg { border: 3px solid #000; border-radius: 15px; position: relative; }
        .koro-msg::before { content: "● ●"; position: absolute; top: -20px; left: 10px; font-size: 12px; }
    </style>
</head>
<body class="koro-face min-h-screen flex flex-col font-mono text-black">

    <header class="p-6 text-center border-b-4 border-black">
        <h1 class="text-3xl font-black">ヌルフフフ、授業を始めますよ</h1>
    </header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 pb-32">
        </main>

    <div class="fixed bottom-0 w-full p-4 bg-white border-t-4 border-black">
        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 p-3 border-4 border-black outline-none focus:bg-yellow-100" placeholder="先生に質問を...">
            <button onclick="askKoro()" class="bg-black text-white px-6 py-2 font-bold hover:bg-gray-800">殺す（送信）</button>
        </div>
    </div>

    <script>
        // ★ここに自分のAPIキーを貼ってください（テスト用）
        const API_KEY = 'AIzaSyAeZSj9AKD3YaT-WhGe85eRhAIqONcXszs'; 

        async function askKoro() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim();
            if (!userText) return;

            // 生徒の表示
            chatBox.innerHTML += `<div class="text-right"><span class="bg-white border-2 border-black p-2 inline-block">君：${userText}</span></div>`;
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `あなたは『暗殺教室』の殺せんせーです。一人称「私（わたくし）」、二人称「君」、語尾「〜ですね」「〜ですよ」、笑い声「ヌルフフフ」を徹底し、親切な教師として答えなさい。質問：${userText}` }] }]
                    })
                });

                const data = await response.json();
                const koroReply = data.candidates[0].content.parts[0].text;

                // 殺せんせーの表示
                chatBox.innerHTML += `<div class="koro-msg bg-yellow-300 p-4 font-bold shadow-[5px_5px_0px_0px_rgba(0,0,0,1)]">
                    <p>殺せんせー：${koroReply}</p>
                </div>`;
                window.scrollTo(0, document.body.scrollHeight);
            } catch (e) {
                alert('マッハ20で逃げられました（エラーが発生しました）');
            }
        }
    </script>
</body>
</html>
